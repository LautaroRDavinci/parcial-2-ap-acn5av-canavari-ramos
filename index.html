<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StyleHub - Reservá tu turno</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>StyleHub</h1>
<h2>Reservá tu turno</h2>

<form id="appointmentForm">
    <label>Nombre del cliente:</label>
    <input type="text" id="clientName" placeholder="Tu nombre" required>

    <label>Servicio:</label>
    <select id="service">
        <option value="1">Corte de pelo - $2500</option>
        <option value="2">Coloración - $5000</option>
        <option value="3">Afeitado - $1500</option>
    </select>

    <label>Profesional:</label>
    <select id="professional">
        <option value="1">Marcos García</option>
        <option value="2">Camila López</option>
        <option value="3">Lucía Fernández</option>
    </select>

    <label>Fecha:</label>
    <input type="date" id="date" required>

    <label>Hora:</label>
    <input type="time" id="time" required>

    <button type="button" onclick="requestAppointment()">Solicitar turno</button>
</form>

<script src="app.js"></script>
</body>
</html>
